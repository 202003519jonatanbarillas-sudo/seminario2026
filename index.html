<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recursos del Seminario</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .recurso {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    iframe {
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .acciones {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #0078d7;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <h1>Recursos del Seminario</h1>

  <!-- Recurso 1: HTML Blockchain -->
  <div class="recurso">
    <iframe src="presentacion_blockchain.html" width="400" height="300"></iframe>
    <div class="acciones">
      <a href="presentacion_blockchain.html" download><button>Descargar HTML</button></a>
      <div id="qr-html1"></div>
    </div>
  </div>

  <!-- Recurso 2: HTML Perspectivas -->
  <div class="recurso">
    <iframe src="presentacion_perspectivas.html" width="400" height="300"></iframe>
    <div class="acciones">
      <a href="presentacion_perspectivas.html" download><button>Descargar HTML</button></a>
      <div id="qr-html2"></div>
    </div>
  </div>

  <!-- Recurso 3: PDF Blockchain -->
  <div class="recurso">
    <iframe src="analisis_blockchain_Latex.pdf" width="400" height="300"></iframe>
    <div class="acciones">
      <a href="analisis_blockchain_Latex.pdf" download><button>Descargar PDF</button></a>
      <div id="qr-doc1"></div>
    </div>
  </div>

  <!-- Recurso 4: PDF Perspectivas -->
  <div class="recurso">
    <iframe src="analisis_blockchain.pdf" width="400" height="300"></iframe>
    <div class="acciones">
      <a href="analisis_blockchain.pdf" download><button>Descargar PDF</button></a>
      <div id="qr-doc2"></div>
    </div>
  </div>

  <!-- Librería QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // Generar QR con URLs públicas de GitHub Pages
    new QRCode(document.getElementById("qr-html1"), "https://202003519jonatanbarillas-sudo.github.io/seminario2026/presentacion_blockchain.html");
    new QRCode(document.getElementById("qr-html2"), "https://202003519jonatanbarillas-sudo.github.io/seminario2026/presentacion_perspectivas.html");
    new QRCode(document.getElementById("qr-doc1"), "https://202003519jonatanbarillas-sudo.github.io/seminario2026/analisis_blockchain_Latex.pdf");
    new QRCode(document.getElementById("qr-doc2"), "https://202003519jonatanbarillas-sudo.github.io/seminario2026/analisis_blockchain.pdf");
  </script>
</body>
</html>
